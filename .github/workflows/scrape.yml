name: 每小時更新票房資料

on:
  schedule:
    - cron: '0 * * * *'   # 每小時整點執行（UTC）
  workflow_dispatch:        # 可手動在 GitHub 觸發

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests beautifulsoup4 lxml

      - name: 執行爬蟲
        run: python scraper.py

      - name: 推送新資料
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "自動更新 $(date '+%Y-%m-%d %H:%M') UTC"
          git push
